# Experiment configuration for OU, Adaptive OU, and TURN baselines

model: meta-llama/Llama-3.2-1B-Instruct
benchmark_dataset: GSM8K  # Options: GSM8K, BBH, CausalJudgement
prompt: |
  A builder has a team of workers completing floors at different rates depending on weather, materials, and coordination. If 60 workers complete 4 floors under normal conditions, how might output change if the team size doubles under varying constraints? Explain step by step.

# Generation parameters
max_new_tokens: 100
num_samples: 50
save_dir: outputs/figures

# OU process parameters

ou:
  T_init: 1.0
  mu: 1.0
  theta: 0.5
  sigma: 0.1
  dt: 1.0

# Adaptive OU feedback thresholds

adaptive_ou:
  entropy_low: 1.0
  entropy_high: 2.0

# TURN (fixed temperature) baseline

turn:
  temperature: 1.0
